<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>Boletim de jv</title>
    <style>
        :root {
            --bg-color: #eef2f7;
            --text-color: #1a1a1a;
            --card-bg: rgba(255, 255, 255, 0.8);
            --accent-color: #007bff;
            --table-header: #007bff;
            --table-border: #ddd;
            --shadow-color: rgba(0,0,0,0.1);
        }
        body.dark {
            --bg-color: #0e1117;
            --text-color: #f1f1f1;
            --card-bg: rgba(30, 34, 45, 0.8);
            --accent-color: #00b4d8;
            --table-header: #00b4d8;
            --table-border: #2b2f3a;
            --shadow-color: rgba(0,0,0,0.6);
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            transition: background 0.5s, color 0.5s;
        }
        .container {
            margin-top: 40px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 30px var(--shadow-color);
            border-radius: 20px;
            padding: 40px;
            width: 80%;
            max-width: 800px;
            transition: background 0.5s, box-shadow 0.5s;
            animation: fadeIn 1s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 20px;
        }
        .logos img {
            width: 90px;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
        }
        h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            text-align: center;
            color: var(--accent-color);
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--text-color);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 20px var(--shadow-color);
        }
        th {
            background: var(--table-header);
            color: white;
            text-align: center;
            padding: 14px;
            font-size: 1em;
        }
        td {
            border-bottom: 1px solid var(--table-border);
            padding: 12px;
            text-align: center;
            font-size: 1em;
        }
        .btn-theme {
            position: fixed;
            top: 20px;
            right: 20px;
            background: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }
        .btn-theme:hover {
            background: var(--accent-color);
            color: white;
        }
        .btn {
            margin-top: 25px;
            padding: 10px 20px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <button class="btn-theme" onclick="toggleTheme()">🌙</button>

    <div class="container">
    
        <h1>Boletim Escolar</h1>
        <h2>jv — Turma 5b</h2>

        <table>
            <tr><th>Disciplina</th><th>Nota</th></tr>
            <tr><td>História</td><td style='color:blue;'>6.0</td></tr>
<tr><td>Geografia</td><td style='color:blue;'>6.0</td></tr>
<tr><td>Literatura</td><td style='color:blue;'>6.0</td></tr>
<tr><td>Redacão</td><td style='color:blue;'>6.0</td></tr>
<tr><td>Inglês</td><td style='color:blue;'>6.0</td></tr>
<tr><td>AT MEDIA 3bi</td><td style='color:blue;'>6.0</td></tr>

        </table>

        <div style="text-align:center;">
            <button class="btn" onclick="window.open('../pasta_pdf/7.pdf', '_blank')">📄 Abrir PDF</button>
        </div>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark');
            const icon = document.querySelector('.btn-theme');
            icon.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
        }
    </script>
</body>
</html>
